# ============================================================
# The Key Vault — Cloudflare Worker Config
# buildwhilebleeding.com
# ============================================================

name = "the-key-vault"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# -- KV Namespace (ACL store) --------------------------------
# Run: wrangler kv namespace create "VAULT_ACL"
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "VAULT_ACL"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"   # ENTRY POINT: KV namespace ID

# -- D1 Database (Audit log) ---------------------------------
# Run: wrangler d1 create the-key-vault-log
# Then replace database_id below
[[d1_databases]]
binding = "VAULT_LOG"
database_name = "the-key-vault-log"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"   # ENTRY POINT: D1 database ID

# -- Routes --------------------------------------------------
# Uncomment to pin to a custom domain under buildwhilebleeding.com
# [[routes]]
# pattern = "vault.buildwhilebleeding.com/mcp"
# zone_name = "buildwhilebleeding.com"

# -- Secrets (never stored here — use wrangler secret put) ---
# wrangler secret put VAULT_ADMIN_TOKEN
# wrangler secret put OPENAI_API_KEY
# wrangler secret put HUGGINGFACE_TOKEN
# wrangler secret put CLOUDFLARE_API_TOKEN
# wrangler secret put STRIPE_SECRET
# ... add any key you want managed by the vault

[observability]
enabled = true
